<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
      @keyframes rotate { from{transform-origin:60px 60px;transform:rotate(0deg)} to{transform-origin:60px 60px;transform:rotate(360deg)} }
      .pulse { animation: pulse 2s ease-in-out infinite; }
      .pulse2 { animation: pulse 2s ease-in-out infinite 0.5s; }
      .pulse3 { animation: pulse 2s ease-in-out infinite 1s; }
    </style>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,200,255,0.05)" stroke-width="1"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle radial glow in center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00C8FF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#050810"/>

  <!-- Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Center radial glow -->
  <rect width="1200" height="630" fill="url(#centerGlow)"/>

  <!-- Corner brackets -->
  <!-- Top left -->
  <path d="M 40 80 L 40 40 L 80 40" fill="none" stroke="rgba(0,200,255,0.5)" stroke-width="1.5"/>
  <!-- Top right -->
  <path d="M 1120 80 L 1120 40 L 1080 40" fill="none" stroke="rgba(0,200,255,0.5)" stroke-width="1.5"/>
  <!-- Bottom left -->
  <path d="M 40 550 L 40 590 L 80 590" fill="none" stroke="rgba(0,200,255,0.5)" stroke-width="1.5"/>
  <!-- Bottom right -->
  <path d="M 1120 550 L 1120 590 L 1080 590" fill="none" stroke="rgba(0,200,255,0.5)" stroke-width="1.5"/>

  <!-- Corner dots -->
  <circle cx="40" cy="40" r="2" fill="rgba(0,200,255,0.4)"/>
  <circle cx="1160" cy="40" r="2" fill="rgba(0,200,255,0.4)"/>
  <circle cx="40" cy="590" r="2" fill="rgba(0,200,255,0.4)"/>
  <circle cx="1160" cy="590" r="2" fill="rgba(0,200,255,0.4)"/>

  <!-- Horizontal rule lines -->
  <line x1="40" y1="100" x2="480" y2="100" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>
  <line x1="720" y1="100" x2="1160" y2="100" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>
  <line x1="40" y1="530" x2="480" y2="530" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>
  <line x1="720" y1="530" x2="1160" y2="530" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>

  <!-- Left side data panel -->
  <rect x="60" y="180" width="180" height="1" fill="rgba(0,200,255,0.15)"/>
  <text x="60" y="198" font-family="monospace" font-size="9" fill="rgba(0,200,255,0.4)" letter-spacing="2">AQI MONITOR</text>
  <text x="60" y="226" font-family="monospace" font-size="28" fill="#00C8FF" filter="url(#glow)">42</text>
  <text x="60" y="244" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" letter-spacing="2">GOOD · TORONTO</text>

  <!-- AQI bar -->
  <rect x="60" y="256" width="180" height="2" fill="rgba(0,200,255,0.1)" rx="1"/>
  <rect x="60" y="256" width="54" height="2" fill="#00C8FF" rx="1" filter="url(#glow)"/>

  <rect x="60" y="290" width="180" height="1" fill="rgba(0,200,255,0.08)"/>
  <text x="60" y="308" font-family="monospace" font-size="9" fill="rgba(0,200,255,0.4)" letter-spacing="2">TEMPERATURE</text>
  <text x="60" y="336" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.7)">24°C</text>
  <text x="60" y="354" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" letter-spacing="2">PARTLY CLOUDY</text>

  <rect x="60" y="376" width="180" height="1" fill="rgba(0,200,255,0.08)"/>
  <text x="60" y="394" font-family="monospace" font-size="9" fill="rgba(0,200,255,0.4)" letter-spacing="2">TRAFFIC FLOW</text>
  <text x="60" y="422" font-family="monospace" font-size="28" fill="rgba(255,255,255,0.7)">187ms</text>
  <text x="60" y="440" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)" letter-spacing="2">AVG RESPONSE</text>

  <!-- Right side data panel -->
  <rect x="960" y="180" width="180" height="1" fill="rgba(0,200,255,0.15)"/>
  <text x="960" y="198" font-family="monospace" font-size="9" fill="rgba(0,200,255,0.4)" letter-spacing="2">SYSTEM STATUS</text>

  <!-- Status indicators -->
  <circle cx="968" cy="218" r="3" fill="#10B981"/>
  <text x="980" y="222" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">API connected</text>

  <circle cx="968" cy="240" r="3" fill="#10B981"/>
  <text x="980" y="244" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">Database online</text>

  <circle cx="968" cy="262" r="3" fill="#F59E0B" class="pulse"/>
  <text x="980" y="266" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)">AI model loading</text>

  <circle cx="968" cy="284" r="3" fill="rgba(255,255,255,0.2)"/>
  <text x="980" y="288" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)">Maps pending</text>

  <circle cx="968" cy="306" r="3" fill="rgba(255,255,255,0.2)"/>
  <text x="980" y="310" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.2)">Dashboard UI</text>

  <!-- Build progress -->
  <rect x="960" y="340" width="180" height="1" fill="rgba(0,200,255,0.08)"/>
  <text x="960" y="358" font-family="monospace" font-size="9" fill="rgba(0,200,255,0.4)" letter-spacing="2">BUILD PROGRESS</text>
  <rect x="960" y="370" width="180" height="2" fill="rgba(0,200,255,0.1)" rx="1"/>
  <rect x="960" y="370" width="22" height="2" fill="#00C8FF" rx="1" filter="url(#glow)"/>
  <text x="960" y="388" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.2)">12% complete</text>

  <rect x="960" y="410" width="180" height="1" fill="rgba(0,200,255,0.08)"/>
  <text x="960" y="428" font-family="monospace" font-size="9" fill="rgba(0,200,255,0.4)" letter-spacing="2">STACK</text>
  <text x="960" y="446" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)">Next.js · TypeScript</text>
  <text x="960" y="462" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)">Tailwind · Node.js</text>
  <text x="960" y="478" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)">IQAir API · Vercel</text>

  <!-- Center ring -->
  <!-- Outer ring -->
  <circle cx="600" cy="315" r="110" fill="none" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>
  <!-- Mid ring -->
  <circle cx="600" cy="315" r="88" fill="none" stroke="rgba(0,200,255,0.12)" stroke-width="1"/>
  <!-- Spinning arc -->
  <circle cx="600" cy="315" r="96" fill="none" stroke="rgba(0,200,255,0.6)" stroke-width="1.5" stroke-dasharray="60 542" stroke-dashoffset="0" filter="url(#glow)"/>
  <circle cx="600" cy="315" r="96" fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="1" stroke-dasharray="20 582" stroke-dashoffset="200"/>
  <!-- Inner ring -->
  <circle cx="600" cy="315" r="68" fill="none" stroke="rgba(0,200,255,0.08)" stroke-width="1"/>
  <!-- Inner spinning arc -->
  <circle cx="600" cy="315" r="76" fill="none" stroke="rgba(0,200,255,0.35)" stroke-width="1" stroke-dasharray="30 448" stroke-dashoffset="100" filter="url(#glow)"/>
  <!-- Core -->
  <circle cx="600" cy="315" r="50" fill="rgba(0,200,255,0.04)"/>
  <circle cx="600" cy="315" r="50" fill="none" stroke="rgba(0,200,255,0.15)" stroke-width="1"/>
  <!-- Center dot -->
  <circle cx="600" cy="315" r="6" fill="#00C8FF" filter="url(#glow-strong)"/>
  <circle cx="600" cy="315" r="3" fill="#fff"/>

  <!-- Ring tick marks -->
  <line x1="600" y1="204" x2="600" y2="212" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>
  <line x1="600" y1="418" x2="600" y2="426" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>
  <line x1="489" y1="315" x2="497" y2="315" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>
  <line x1="703" y1="315" x2="711" y2="315" stroke="rgba(0,200,255,0.4)" stroke-width="1"/>

  <!-- Center text -->
  <text x="600" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,200,255,0.5)" letter-spacing="4">INITIALISING</text>

  <!-- Main title -->
  <text x="600" y="296" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)" letter-spacing="6">SMART CITY</text>
  <text x="600" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="300" fill="#E2E8F0" letter-spacing="3">Dashboard</text>
  <text x="600" y="364" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(0,200,255,0.5)" letter-spacing="3">COMING SOON_</text>

  <!-- Connector lines from ring to panels -->
  <line x1="490" y1="315" x2="280" y2="315" stroke="rgba(0,200,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="710" y1="315" x2="920" y2="315" stroke="rgba(0,200,255,0.08)" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="280" cy="315" r="2" fill="rgba(0,200,255,0.3)"/>
  <circle cx="920" cy="315" r="2" fill="rgba(0,200,255,0.3)"/>

  <!-- Bottom status bar -->
  <rect x="440" y="470" width="320" height="28" rx="4" fill="rgba(0,200,255,0.04)" stroke="rgba(0,200,255,0.1)" stroke-width="0.5"/>
  <circle cx="460" cy="484" r="3" fill="#00C8FF" class="pulse"/>
  <text x="474" y="488" font-family="monospace" font-size="9" fill="rgba(0,200,255,0.5)" letter-spacing="2">LIVE · OPEN SOURCE · VERCEL</text>

  <!-- Bottom URL hint -->
  <text x="600" y="518" text-anchor="middle" font-family="monospace" font-size="9" fill="rgba(255,255,255,0.12)" letter-spacing="1">smart-city-dashboard-sable.vercel.app</text>

  <!-- Decorative scattered dots -->
  <circle cx="290" cy="160" r="1.5" fill="rgba(0,200,255,0.2)"/>
  <circle cx="350" cy="480" r="1" fill="rgba(0,200,255,0.15)"/>
  <circle cx="850" cy="150" r="1.5" fill="rgba(0,200,255,0.2)"/>
  <circle cx="910" cy="470" r="1" fill="rgba(0,200,255,0.15)"/>
  <circle cx="160" cy="430" r="1" fill="rgba(0,200,255,0.1)"/>
  <circle cx="1040" cy="200" r="1" fill="rgba(0,200,255,0.1)"/>
</svg>
